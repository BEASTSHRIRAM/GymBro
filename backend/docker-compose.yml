version: '3.8'

services:
  # 1. MongoDB (Hard Facts & Profiles)
  mongodb:
    image: mongo:latest
    container_name: gymbro-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # 2. Redis (Ultra-fast Short-Term Memory)
  redis:
    image: redis:alpine
    container_name: gymbro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 3. Qdrant (Vector Database for Long-Term Semantic Memory)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: gymbro-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  qdrant_data:
